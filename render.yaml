services:
  - type: web
    name: mychatbot-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHATBOT_DEBUG
        value: "false"
      - key: NEXT_PUBLIC_CHATBOT_DEBUG
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
